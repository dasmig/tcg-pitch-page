name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  validate:
    name: Validate HTML
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check files exist
        run: test -f index.html
